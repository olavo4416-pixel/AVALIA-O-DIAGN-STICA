<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contato</title>
</head>

<body>

<h1>Formulário de Contato</h1>

<form action="sucesso.html">

<label>Nome:</label><br>
<input type="text" name="nome"
required><br><br>

<label>Email:</label><br>
<input type="email" name="email"
required><br><br>

<label>Assunto:</label><br>
<input type="text" name="assunto"
required><br><br>

<label>Mensagem:</label><br>
<textarea name="mensagem" required></textarea><br><br>

<label>Telefone:</label><br>
<input type="tel" name="telefone"><br><br>

<label>Data de contato</label><br>
<input type="date" name="data"><br><br>

<label>Motivo de contato</label><br>
<select name="motivo">
<option>Dúvida</option>
<option>orçamento</option>
<option>Trabalho</option>
</select><br><br>

<label>Tipo de contato:</label><br>
<input type="radio" name="tipo">Email
<input type="radio" name="tipo">
Telefone<br><br>

<label>Interesses:</label><br>
<input type="checkbox"> Site
<input type="checkbox"> Aplicativo
<input type="checkbox"> Design<br><br>


<input type="submit" value="Enviar">
<input type="reset" value="Limpar formulário">

</form>

<br>
<a href="Inicial.html">Voltar para página inicial</a>

</body>
</html>
